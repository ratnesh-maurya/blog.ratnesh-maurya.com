<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" aria-labelledby="title desc"><desc id="desc">A six-step rollout workflow from install and tests to phased deploy and audit trail.</desc><defs><linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#fff9ef"/><stop offset="100%" stop-color="#f7eddc"/></linearGradient><style>.t{font:700 26px&quot;Avenir Next&quot;,&quot;Helvetica Neue&quot;,Arial,sans-serif;fill:#1f2a37}.b{font:500 21px&quot;Avenir Next&quot;,&quot;Helvetica Neue&quot;,Arial,sans-serif;fill:#46536d}</style></defs><path fill="url(#bg3)" d="M0 0h1600v900H0z"/><rect width="1460" height="760" x="70" y="70" fill="#fff" stroke="#e7dbc8" rx="28"/><text x="130" y="170" style="font:700 52px&quot;Avenir Next&quot;,&quot;Helvetica Neue&quot;,Arial,sans-serif;fill:#1f2a37">Go 1.26.2 Upgrade Flow</text><text x="130" y="214" style="font:500 24px&quot;Avenir Next&quot;,&quot;Helvetica Neue&quot;,Arial,sans-serif;fill:#4e5a73">A practical sequence for low-risk production adoption</text><rect width="390" height="130" x="120" y="280" fill="#ffe4c1" stroke="#ddb387" rx="18"/><text x="150" y="332" class="t">1. Pin version</text><text x="150" y="368" class="b">Install exact 1.26.2 toolchain</text><rect width="390" height="130" x="605" y="280" fill="#d9ebff" stroke="#95b8dd" rx="18"/><text x="635" y="332" class="t">2. Run tests</text><text x="635" y="368" class="b">Unit, integration, and race checks</text><rect width="390" height="130" x="1090" y="280" fill="#ddf4d7" stroke="#9cc696" rx="18"/><text x="1120" y="332" class="t">3. Scan vulns</text><text x="1120" y="368" class="b">Run govulncheck in CI</text><rect width="390" height="130" x="120" y="500" fill="#ffeec7" stroke="#d9bd74" rx="18"/><text x="150" y="552" class="t">4. Network smoke tests</text><text x="150" y="588" class="b">Validate URL, HTTP, TLS paths</text><rect width="390" height="130" x="605" y="500" fill="#ffdbe4" stroke="#d8a0ae" rx="18"/><text x="635" y="552" class="t">5. Phased rollout</text><text x="635" y="588" class="b">Canary then staged deploy</text><rect width="390" height="130" x="1090" y="500" fill="#e8ddff" stroke="#b3a0d8" rx="18"/><text x="1120" y="552" class="t">6. Record evidence</text><text x="1120" y="588" class="b">Checksums, test IDs, rollback plan</text><path stroke="#8f9bb4" stroke-width="4" d="M510 345h95"/><path fill="#8f9bb4" d="m605 345-17-9v18z"/><path stroke="#8f9bb4" stroke-width="4" d="M995 345h95"/><path fill="#8f9bb4" d="m1090 345-17-9v18z"/><path stroke="#8f9bb4" stroke-width="4" d="M1285 410v90"/><path fill="#8f9bb4" d="m1285 500-9-17h18z"/><path stroke="#8f9bb4" stroke-width="4" d="M1090 565h-95"/><path fill="#8f9bb4" d="m995 565 17-9v18z"/><path stroke="#8f9bb4" stroke-width="4" d="M605 565h-95"/><path fill="#8f9bb4" d="m510 565 17-9v18z"/></svg>
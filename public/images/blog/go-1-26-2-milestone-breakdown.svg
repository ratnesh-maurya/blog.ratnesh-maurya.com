<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Go 1.26.2 milestone breakdown</title>
  <desc id="desc">Bar-chart style visual of issue-label counts observed in Go1.26.2 milestone.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0" />
      <stop offset="100%" stop-color="#f9f0df" />
    </linearGradient>
    <style>
      .h { font: 700 54px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #1f2a37; }
      .s { font: 500 24px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #49556f; }
      .l { font: 600 28px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #233148; }
      .n { font: 700 30px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #1b263a; }
      .f { font: 500 17px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #5b6985; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg2)" />
  <rect x="70" y="70" width="1460" height="760" rx="28" fill="#fff" stroke="#e6d9c4" />

  <text x="130" y="170" class="h">Go1.26.2 Milestone Snapshot</text>
  <text x="130" y="214" class="s">Closed issues: 31 | Open issues: 0 | Data source: GitHub milestone API</text>

  <line x1="350" y1="300" x2="1410" y2="300" stroke="#e8dece" stroke-width="2" />
  <line x1="350" y1="390" x2="1410" y2="390" stroke="#e8dece" stroke-width="2" />
  <line x1="350" y1="480" x2="1410" y2="480" stroke="#e8dece" stroke-width="2" />
  <line x1="350" y1="570" x2="1410" y2="570" stroke="#e8dece" stroke-width="2" />
  <line x1="350" y1="660" x2="1410" y2="660" stroke="#e8dece" stroke-width="2" />

  <text x="130" y="315" class="l">CVE-related titles</text>
  <rect x="350" y="278" width="820" height="48" rx="12" fill="#ffd8b1" stroke="#e5b482" />
  <text x="1190" y="312" class="n">10</text>

  <text x="130" y="405" class="l">compiler/runtime label</text>
  <rect x="350" y="368" width="820" height="48" rx="12" fill="#c6ddff" stroke="#8fb0dc" />
  <text x="1190" y="402" class="n">10</text>

  <text x="130" y="495" class="l">Documentation label</text>
  <rect x="350" y="458" width="330" height="48" rx="12" fill="#d7f5d2" stroke="#98c693" />
  <text x="700" y="492" class="n">4</text>

  <text x="130" y="585" class="l">Testing label</text>
  <rect x="350" y="548" width="170" height="48" rx="12" fill="#fff0bf" stroke="#d5bc74" />
  <text x="540" y="582" class="n">2</text>

  <text x="130" y="675" class="l">GoCommand label</text>
  <rect x="350" y="638" width="90" height="48" rx="12" fill="#ffd2de" stroke="#d89aab" />
  <text x="460" y="672" class="n">1</text>

  <text x="130" y="790" class="f">Note: categories overlap. Counts are per-label or title pattern and are not additive.</text>
</svg>
